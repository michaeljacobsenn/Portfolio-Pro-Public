name = "portfolioproapp"
main = "src/index.js"
compatibility_date = "2024-12-01"

[vars]
ALLOWED_ORIGIN = "https://catalystcash.app"
GATING_MODE = "soft"

# Custom domain: Once catalystcash.app is proxied through Cloudflare,
# add the custom domain via Dashboard → Workers → catalyst-cash-api → Triggers → Custom Domains → api.catalystcash.app

[[d1_databases]]
binding = "DB"
database_name = "catalyst-cash-db"
database_id = "624abdaa-25bd-432a-a12b-39e2dbd7530e"
migrations_dir = "migrations"

[durable_objects]
bindings = [
  { name = "RATE_LIMITER", class_name = "RateLimiter" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]
